<div class="home-container">
  <mat-card>
    <mat-card-header>
      <mat-card-title>Welcome to Pokedex Angular</mat-card-title>
    </mat-card-header>
    <mat-card-content>
      <p>
        This is a mini Pokedex built with Angular 21 and Angular Material,
        consuming data from the PokéAPI.
      </p>
      <p>
        Browse the list of Pokémon, click on any of them to see details like
        height, weight, and type.
      </p>
    </mat-card-content>
    <mat-card-actions>
      <a mat-raised-button color="primary" routerLink="/pokemon">
        View Pokemon list
      </a>
    </mat-card-actions>
  </mat-card>
</div>
